<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<style>

/* ── Reset & Base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: Helvetica, Arial, sans-serif;
    color: #1a1d2e;
    font-size: 10.5pt;
    line-height: 1.75;
    background: #ffffff;
}

@page {
    size: A4;
    margin: 25px;
}

/* ══════════════════════════════════════════════════════════
   REPORT BODY
══════════════════════════════════════════════════════════ */

.report {
    padding: 44px 52px 36px;
}

/* ── Report Header ──────────────────────────────────────── */

.report-header {
    border-bottom: 2.5px solid #4f46e5;
    padding-bottom: 18px;
    margin-bottom: 36px;
}

.report-header-row {
    width: 100%;
}

.report-header-row td {
    vertical-align: bottom;
}

.report-badge-cell {
    text-align: right;
    white-space: nowrap;
}

.report-badge {
    display: inline-block;
    background: #eef2ff;
    color: #4f46e5;
    font-size: 7.5pt;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
}

.report-header h1 {
    font-size: 20pt;
    font-weight: 700;
    color: #0f1123;
    margin: 0 0 6px 0;
    line-height: 1.2;
}

.prepared-by {
    margin-top: 8px;
    color: #6b7280;
    font-size: 8.5pt;
}

.prepared-by-accent {
    color: #4f46e5;
    font-weight: 600;
}

/* ── Section Headings ───────────────────────────────────── */

h2 {
    font-size: 11pt;
    font-weight: 700;
    color: #0f1123;
    margin-top: 34px;
    margin-bottom: 14px;
    
    padding-left: 14px;
    border-left: 4px solid #4f46e5;
    line-height: 1.4;
}

/* ── Paragraphs ─────────────────────────────────────────── */

p {
    margin-bottom: 14px;
    line-height: 1.8;
    text-align: justify;
    color: #374151;
}

strong {
    font-weight: 700;
    color: #1a1d2e;
}

/* ── Standard Lists ─────────────────────────────────────── */

ul {
    margin-left: 0;
    margin-bottom: 16px;
    padding-left: 0;
    list-style: none;
}

ul li {
    padding-left: 16px;
    margin-bottom: 9px;
    color: #374151;
    line-height: 1.7;
    position: relative;
}

ul li::before {
    content: '\25B8'; /* ▸ */
    position: absolute;
    left: 0;
    color: #4f46e5;
    font-size: 9pt;
}

/* ── Pain Point Callout Boxes ───────────────────────────── */

.pain-box {
    background: #f5f5ff;
    border-left: 4px solid #4f46e5;
    padding: 13px 16px;
    margin-bottom: 12px;
    line-height: 1.7;
}

.pain-box strong {
    color: #4f46e5;
    font-weight: 700;
}

/* ── Next Steps List ────────────────────────────────────── */

ul.steps-list {
    list-style: none;
    padding: 0;
    margin: 0 0 16px 0;
}

ul.steps-list li {
    padding-left: 16px;
    margin-bottom: 9px;
    color: #374151;
    line-height: 1.7;
    position: relative;
}

ul.steps-list li::before {
    content: '\25B8';
    position: absolute;
    left: 0;
    color: #4f46e5;
    font-size: 9pt;
}

/* ── Report Footer ──────────────────────────────────────── */

.report-footer {
    margin-top: 48px;
    border-top: 1px solid #e5e7eb;
    padding-top: 14px;
}

.footer-table {
    margin-top: 24px;
    padding-top: 10px;
    width: 100%;
}

.footer-left {
    text-align: left;
    padding-top: 10px;
    font-size: 8pt;
    color: #9ca3af;
}

.footer-right {
    text-align: right;
    padding-top: 10px;
    font-size: 8pt;
    color: #9ca3af;
}

.footer-accent {
    color: #4f46e5;
    font-weight: 600;
}

</style>
</head>

<body>

<!-- ══ REPORT BODY ═════════════════════════════════════════ -->

<div class="report">

  <div class="report-header">
    <table class="report-header-row">
      <tr>
        <td>
          <h1>{{ company }} — Intelligence Brief</h1>
          <div class="prepared-by">
            Prepared by <span class="prepared-by-accent">{{ your_company }}</span> &nbsp;&middot;&nbsp; {{ date }}
          </div>
        </td>
        <td class="report-badge-cell">
          <span class="report-badge">Confidential</span>
        </td>
      </tr>
    </table>
  </div>

  {{ report_html | safe }}

  <div class="report-footer">
    <table class="footer-table">
      <tr>
        <td class="footer-left">
          <span class="footer-accent">{{ your_company }}</span> &copy; {{ year }}
        </td>
        <td class="footer-right">
            {{ name }} &nbsp;&middot;&nbsp; {{ email }}
        </td>
      </tr>
    </table>
  </div>

</div>

</body>
</html>
